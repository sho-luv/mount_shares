[global]
   workgroup = WORKGROUP
   netbios name = SMBSERVER
   server string = Test Samba
   security = user
   map to guest = Never
   passdb backend = tdbsam
   log level = 1
   server min protocol = SMB2
   smb ports = 445
   disable netbios = yes

# --- normal readable + writable share ---
[public]
   path = /srv/shares/public
   valid users = testuser
   read only = no

# --- read-only share (READ but no WRITE) ---
[readonly]
   path = /srv/shares/readonly
   valid users = testuser
   read only = yes

# --- share name with a SPACE ---
[Shared Folder]
   path = /srv/shares/shared_folder
   valid users = testuser
   read only = no

# --- special characters: ampersand, parentheses ---
[R&D (2024)]
   path = /srv/shares/rnd
   valid users = testuser
   read only = yes

# --- apostrophe in the share name (shell-quoting killer) ---
[it's data]
   path = /srv/shares/apostrophe
   valid users = testuser
   read only = yes

# --- dollar sign / hidden-style share ---
[data$]
   path = /srv/shares/dollar
   valid users = testuser
   read only = yes

# --- two words, another space ---
[deep space]
   path = /srv/shares/deep_space
   valid users = testuser
   read only = yes

# --- NO access for testuser (only otheruser) -> should be skipped ---
[secret]
   path = /srv/shares/secret
   valid users = otheruser
   read only = yes

# --- writable dropbox (for -write path) ---
[dropbox]
   path = /srv/shares/dropbox
   valid users = testuser
   read only = no
